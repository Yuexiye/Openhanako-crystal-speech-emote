<title>晶花发言 · 预览工作�?/title>
<style>
/* ══════════════════════════════════════�?   晶花发言工作�?· Ophelia 布局设计
   ══════════════════════════════════════�?*/
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height:100vh; overflow:hidden;
  background:#1a1a2e; color:#ddd; font-family:system-ui,sans-serif;
}

/* ── 布局容器 ── */
.layout { display:flex; flex-direction:column; height:100vh; max-width:1400px; margin:0 auto; }

/* ── 顶栏（助手选择�?── */
.topbar {
  flex-shrink:0; height:38px; padding:0 14px;
  display:flex; align-items:center; gap:5px;
  background:rgba(255,255,255,0.02);
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.topbar-label { font-size:10px; color:#666; letter-spacing:1px; margin-right:6px; text-transform:uppercase; }

/* ── 预览英雄�?── */
.preview-zone {
  flex:0 0 auto; padding:10px 20px 6px;
  border-bottom:1px solid rgba(255,255,255,0.04);
}

/* ── 底栏双列 ── */
.bottom {
  flex:1; display:flex; gap:12px; overflow:hidden;
  padding:8px 20px 12px; min-height:0;
}
.panel {
  flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:7px;
  padding-right:6px;
}
.panel::-webkit-scrollbar { width:3px; }
.panel::-webkit-scrollbar-track { background:transparent; }
.panel::-webkit-scrollbar-thumb { background:#333; border-radius:2px; }

/* ── 卡片 ── */
.card {
  background:rgba(255,255,255,0.04);
  border-radius:10px; padding:8px 10px;
}
.card-title {
  font-size:10px; color:#666; letter-spacing:1px;
  margin-bottom:6px; text-transform:uppercase;
}

/* ── 按钮 ── */
.btn-group { display:flex; flex-wrap:wrap; gap:4px; }
.btn {
  border:1px solid #3a3a4a; background:transparent; color:#999;
  border-radius:7px; padding:3px 8px; font-size:11px; cursor:pointer;
  transition:all .12s; white-space:nowrap;
}
.btn:hover { border-color:#666; color:#ccc; }
.btn.active {
  border-color:var(--accent,#ff314f); color:var(--accent,#ff314f);
  background:color-mix(in srgb, var(--accent,#ff314f) 12%, transparent);
}

/* ── 顶栏的助手按�?── */
.agent-btn { padding:3px 10px; font-size:11px; }
.agent-btn .dot {
  display:inline-block; width:7px; height:7px;
  border-radius:50%; margin-right:4px; vertical-align:middle;
}

/* ── 字体网格 ── */
.font-grid { display:grid; grid-template-columns:1fr 1fr; gap:3px; }
.font-grid .btn {
  padding:3px 6px; font-size:11px;
  overflow:hidden; text-overflow:ellipsis;
}

/* ── 装饰符号紧凑�?── */
.deco-strip { display:flex; gap:3px; flex-wrap:wrap; }
.deco-btn {
  width:30px; height:30px; padding:0;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; border-radius:6px;
}

/* ── 表单控件 ── */
.field { margin-bottom:4px; }
.field label { display:block; font-size:9px; color:#666; margin-bottom:2px; letter-spacing:.5px; }
.field input, .field select, .field textarea {
  width:100%; background:#16162a; border:1px solid #2a2a3a;
  border-radius:6px; padding:4px 7px; font-size:12px; color:#ddd; outline:none;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color:var(--accent,#ff314f);
}
.field textarea { font-size:14px; resize:vertical; min-height:30px; }

/* ── 颜色�?── */
.color-row { display:flex; gap:4px; align-items:center; }
.color-row .field { flex:1; margin-bottom:0; }
.color-swatch { width:22px; height:22px; border-radius:5px; border:2px solid #3a3a4a; flex-shrink:0; overflow:hidden; }
.color-swatch input[type="color"] { width:calc(100%+8px); height:calc(100%+8px); border:none; padding:0; margin:-4px; cursor:pointer; background:none; }

/* ── 预览气泡 ── */
.bubble {
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(6px);
  border-radius:20px 20px 8px 20px;
  border-left:4px solid var(--accent,#ff314f);
  box-shadow:0 8px 32px rgba(0,0,0,.35), 0 0 50px color-mix(in srgb, var(--accent,#ff314f) 8%, transparent);
  padding:20px 26px; min-height:100px; position:relative;
}
.bubble::after {
  content:''; position:absolute; bottom:-6px; right:12px;
  width:12px; height:12px; background:rgba(255,255,255,0.03);
  clip-path:polygon(0 0, 0% 100%, 100% 0);
}
.bubble .ph { color:#555; text-align:center; padding:14px 0; font-size:12px; }

.deco { color:var(--accent2,#ff8a9a); font-size:17px; margin-right:4px; }
.crystal {
  color:var(--accent,#ff314f);
  font-family:var(--font,'Dancing Script',cursive);
  font-size:24px; font-weight:600; font-style:italic;
  letter-spacing:.5px; line-height:1.5;
  text-decoration-line:underline; text-decoration-color:var(--accent,#ff314f);
  text-decoration-thickness:1px; text-underline-offset:6px;
  text-shadow:0 0 6px var(--glow,rgba(255,49,79,.35)),0 0 14px var(--glow,rgba(255,49,79,.15));
}
.sub {
  color:var(--sub,#b0b0b0); font-size:13px; letter-spacing:.5px;
  margin:3px 0 6px 0; padding-left:4px;
  font-family:var(--cnfont,system-ui);
}
.sub::before { content:'�?'; color:#666; }

/* ── 输出带（LaTeX + 文本 + 保存 三列�?── */
.output-strip { display:flex; gap:6px; margin-top:6px; }
.output-strip > * { flex:1; min-width:0; display:flex; flex-direction:column; }
.code-block {
  background:#16162a; border:1px solid #2a2a3a; border-radius:6px;
  padding:5px 8px; font-family:'Consolas',monospace; font-size:10px;
  color:#7a7a9a; word-break:break-all; line-height:1.5;
  max-height:36px; overflow:hidden; text-overflow:ellipsis;
  white-space:nowrap;
}
.code-label { font-size:9px; color:#555; margin-bottom:2px; }
.btn-save {
  background:var(--accent,#ff314f); border:none; color:#fff;
  padding:5px 10px; border-radius:6px; font-size:11px; cursor:pointer;
  white-space:nowrap; margin-top:auto;
}
.btn-save:hover { opacity:.85; }
.btn-copy {
  background:#2a2a3a; border:none; color:#999;
  padding:3px 7px; border-radius:4px; font-size:9px; cursor:pointer;
  margin-top:2px; align-self:flex-start;
}
.btn-copy:hover { background:#3a3a5a; color:#ddd; }

/* ── 语气映射�?── */
.tone-table { width:100%; border-collapse:collapse; margin:3px 0; }
.tone-table td, .tone-table th {
  border:1px solid #2a2a3a; padding:2px 5px; font-size:10px; color:#aaa; text-align:left;
}
.tone-table th { color:#666; font-weight:400; background:#16162a; }
.tone-table input {
  background:transparent; border:none; padding:1px 3px; font-size:10px; color:#ddd; width:100%; outline:none;
}
.tone-table input:focus { outline:1px solid var(--accent,#ff314f); border-radius:2px; }
.tone-add-row { display:flex; gap:4px; margin-top:3px; }
.tone-add-row input { flex:1; background:#16162a; border:1px solid #2a2a3a; border-radius:4px; padding:3px 6px; font-size:10px; color:#ddd; }

/* ── 表情�?── */
.emote-strip { display:flex; gap:5px; }
.emote-slot {
  width:44px; height:44px; border-radius:8px;
  border:2px dashed #333; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  font-size:8px; color:#555; position:relative; gap:1px;
  transition:all .15s;
}
.emote-slot:hover { border-color:var(--accent,#ff314f); }
.emote-slot .emoji { font-size:18px; }
.emote-slot.active {
  border-color:var(--accent,#ff314f); border-style:solid;
  box-shadow:0 0 6px color-mix(in srgb, var(--accent,#ff314f) 20%, transparent);
}
.emote-slot img { width:100%; height:100%; border-radius:6px; object-fit:cover; }
.emote-upload {
  position:absolute; bottom:-2px; right:-2px;
  width:15px; height:15px; border-radius:50%;
  background:var(--accent,#ff314f); color:#fff;
  font-size:8px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; line-height:1;
}
.emote-hint {
  margin-top:4px; font-size:10px; color:#555;
  background:#16162a; border-radius:6px; padding:6px 8px;
  border:1px dashed #2a2a3a;
}

/* ── Toast ── */
.toast {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background:#2a2a3a; border-left:3px solid var(--accent,#ff314f);
  padding:8px 16px; border-radius:6px; font-size:11px; color:#ddd;
  box-shadow:0 4px 16px rgba(0,0,0,.4);
  animation:fadeInUp .25s ease; z-index:999;
}
@keyframes fadeInUp { from { opacity:0; transform:translateX(-50%) translateY(8px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
</style>
</head>

<script>
// ════════════════════════════════════════════════════════════
// 以下 JS 逻辑与之前一�?// ════════════════════════════════════════════════════════════
let API = '';
(function() {
  const tk = new URL(location.href).searchParams.get('token');
  API = window.location.origin;
  window._hanaTk = tk;
})();
function hanaUrl(path) { return (window._hanaTk ? window.location.origin + path + '?token=' + encodeURIComponent(window._hanaTk) : window.location.origin + path); }
// 默认主题（未配置的助手使用）
const DEFAULT_THEME = {
  primary:'#6aa7ff', secondary:'#b8d7ff', subColor:'#b0b0b0',
  font:"'Dancing Script','Brush Script MT',cursive", cnFont:'system-ui,sans-serif',
  enSize:'large', cnSize:'small'
};

let currentAgent = null;
let agentsConfig = {};

window.addEventListener('error', e => { window.__initError = e.message || String(e); });
window.addEventListener('unhandledrejection', e => { window.__initError = (e.reason && e.reason.message) || String(e.reason); });
function sendReady() { try { window.parent.postMessage({ type: 'ready' }, '*'); } catch {} }

// 立即通知宿主（防止超时）
sendReady();
// 备用重试（宿主页面容器可能延迟注册监听）
setTimeout(sendReady, 200);
setTimeout(sendReady, 500);
setTimeout(sendReady, 1000);

async function init() {
  try {
    await loadConfig();
    if (!currentAgent && Object.keys(agentsConfig).length > 0) {
      currentAgent = Object.keys(agentsConfig)[0];
    }
    renderTopbar();
    renderFontBtns();
    renderCnFontBtns();
    renderDecoBtns();
    setupColorPickerSync();
    setupEventListeners();
    if (currentAgent) selectAgent(currentAgent);
    // 内容渲染完毕，再次通知就绪
    sendReady();
  } catch(e) { window.__initError = (e && e.message) || String(e); }
}

async function loadConfig() {
  try { const r = await fetch(hanaUrl('/api/plugins/crystal-speech-emote/api/agents')); agentsConfig = await r.json(); }
  catch(e) { agentsConfig = {}; }
}

function renderTopbar() {
  const g = document.getElementById('agentGroup');
  g.innerHTML = Object.entries(agentsConfig).map(([id,conf]) => {
    const name = escHtml(conf.displayName || id);
    const accent = escStyle(conf.theme?.primary || DEFAULT_THEME.primary);
    return `<button class="btn agent-btn" data-id="${escAttr(id)}" style="--accent:${accent}"><span class="dot" style="background:${accent}"></span>${name}</button>`;
  }).join('');
  g.addEventListener('click', e => {
    const b = e.target.closest('.agent-btn'); if(!b) return;
    selectAgent(b.dataset.id);
  });
}

function selectAgent(id) {
  currentAgent = id;
  const conf = agentsConfig[id];
  const theme = conf?.theme;
  const dt = DEFAULT_THEME;
  document.querySelectorAll('.agent-btn').forEach(b => b.classList.toggle('active', b.dataset.id === id));
  // 优先用配置里�?theme，缺失字段用默认值补�?  const p = theme?.primary || dt.primary;
  const s = theme?.secondary || dt.secondary;
  const sb = theme?.subColor || dt.subColor;
  const f = theme?.font || dt.font;
  const g = theme?.primaryGlow || hexToRgba(p, 0.4);
  applyTheme(p, s, sb, f, g);
  syncColorInputs(p, s, sb);
  updateFontSelection(f);
  if (theme?.cnFont) {
    document.documentElement.style.setProperty('--cnfont', theme.cnFont);
    document.querySelectorAll('#cnFontGroup .btn').forEach(b => b.classList.toggle('active', b.dataset.cnfont === theme.cnFont));
  }
  document.getElementById('enSizeSelect').value = theme?.enSize || dt.enSize;
  document.getElementById('cnSizeSelect').value = theme?.cnSize || dt.cnSize;
  // 恢复保存的装饰符
  if (theme?.deco) {
    document.querySelectorAll('#decoGroup .btn').forEach(b => b.classList.toggle('active', b.dataset.deco === theme.deco));
  }
  renderToneMap(id);
  renderEmoteStrip(id);
  updatePreview();
}

function applyTheme(p, s, sb, f, g) {
  const r = document.documentElement;
  r.style.setProperty('--accent', p);
  r.style.setProperty('--accent2', s);
  r.style.setProperty('--sub', sb);
  r.style.setProperty('--font', f);
  r.style.setProperty('--glow', g);
  document.querySelectorAll('.btn-save').forEach(b => b.style.background = p);
}

function syncColorInputs(p, s, sb) {
  document.getElementById('colorPrimary').value = p; document.getElementById('colorPrimaryPicker').value = p;
  document.getElementById('colorSecondary').value = s; document.getElementById('colorSecondaryPicker').value = s;
  document.getElementById('colorSub').value = sb; document.getElementById('colorSubPicker').value = sb;
}

function setupColorPickerSync() {
  ['Primary','Secondary','Sub'].forEach(k => {
    const t = document.getElementById('color'+k);
    const p = document.getElementById('color'+k+'Picker');
    t.addEventListener('input', () => { p.value = t.value; onColorChange(); });
    p.addEventListener('input', () => { t.value = p.value; onColorChange(); });
  });
}

function onColorChange() {
  const p = document.getElementById('colorPrimary').value;
  const s = document.getElementById('colorSecondary').value;
  const sb = document.getElementById('colorSub').value;
  const f = document.querySelector('#fontGroup .btn.active')?.dataset.font || "'Dancing Script','Brush Script MT',cursive";
  applyTheme(p, s, sb, f, hexToRgba(p,0.4));
  updatePreview();
}

function hexToRgba(h, a) {
  if (!h || h.length < 7) return 'rgba(255,49,79,0.4)';
  const r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function renderFontBtns() {
  document.getElementById('fontGroup').addEventListener('click', e => {
    const b = e.target.closest('.btn'); if(!b) return;
    updateFontSelection(b.dataset.font); updatePreview();
  });
}
function updateFontSelection(f) {
  document.querySelectorAll('#fontGroup .btn').forEach(b => b.classList.toggle('active', b.dataset.font === f));
}

function renderCnFontBtns() {
  document.getElementById('cnFontGroup').addEventListener('click', e => {
    const b = e.target.closest('.btn'); if(!b) return;
    document.querySelectorAll('#cnFontGroup .btn').forEach(btn => btn.classList.remove('active'));
    b.classList.add('active');
    document.documentElement.style.setProperty('--cnfont', b.dataset.cnfont);
    updatePreview();
  });
}

function renderDecoBtns() {
  document.getElementById('decoGroup').addEventListener('click', e => {
    const b = e.target.closest('.btn'); if(!b) return;
    document.querySelectorAll('#decoGroup .btn').forEach(btn => btn.classList.remove('active'));
    b.classList.add('active');
    updatePreview();
  });
}

function renderToneMap(agentId) {
  const conf = agentsConfig[agentId];
  const tbody = document.getElementById('toneBody');
  const map = conf?.toneMap || {};
  const entries = Object.entries(map);
  if (entries.length === 0) {
    tbody.innerHTML = '<tr><td colspan="2" style="text-align:center;color:#555;font-size:10px">暂无映射</td></tr>';
    return;
  }
  tbody.innerHTML = entries.map(([key, val]) =>
    `<tr><td><input class="tone-key" value="${escAttr(key)}"></td><td><input class="tone-val" value="${escAttr(val)}"></td></tr>`
  ).join('');
}

document.getElementById('toneAddBtn').addEventListener('click', () => {
  const key = document.getElementById('toneNewKey').value.trim();
  if (!key) return;
  if (!agentsConfig[currentAgent]) agentsConfig[currentAgent] = { displayName: agentsConfig[currentAgent]?.displayName||currentAgent, theme:{}, emotes:{}, toneMap:{} };
  if (!agentsConfig[currentAgent].toneMap) agentsConfig[currentAgent].toneMap = {};
  agentsConfig[currentAgent].toneMap[key] = 'happy';
  document.getElementById('toneNewKey').value = '';
  renderToneMap(currentAgent);
  updatePreview();
});

function collectToneMap() {
  const map = {};
  document.querySelectorAll('#toneBody tr').forEach(tr => {
    const inputs = tr.querySelectorAll('input');
    if (inputs.length === 2) {
      const k = inputs[0].value.trim(), v = inputs[1].value.trim();
      if (k) map[k] = v || 'happy';
    }
  });
  return map;
}

function renderEmoteStrip(agentId) {
  const conf = agentsConfig[agentId];
  const strip = document.getElementById('emoteStrip');
  const tone = document.getElementById('toneInput').value;
  const agentToneMap = agentsConfig[currentAgent]?.toneMap || {};
  const activeId = agentToneMap[tone] || Object.values(agentToneMap)[0] || 'happy';
  // 从 toneMap 的值去重生成槽位，确保所有映射的表情都能显示
  const toneIds = [...new Set(Object.values(agentToneMap))];
  const emoteList = toneIds.length > 0
    ? toneIds.map(id => ({ id, emoji: '🖼', label: id }))
    : [
        { id:'happy', emoji:'😊', label:'开心' },
        { id:'angry', emoji:'😤', label:'不爽' },
        { id:'smirk', emoji:'😏', label:'调侃' },
        { id:'serious', emoji:'🤔', label:'认真' },
        { id:'soft', emoji:'🤗', label:'温柔' }
      ];
  const emotes = conf?.emotes || {};
  strip.innerHTML = emoteList.map(e => {
    const active = e.id === activeId;
    const hasImg = emotes[e.id];
    return `<div class="emote-slot${active?' active':''}" style="${active?'border-color:var(--accent);color:var(--accent)':''}">
      ${hasImg ? `<img src="${escAttr(API + '/' + emotes[e.id])}">` : `<span class="emoji">${e.emoji}</span>`}
      <input type="file" accept="image/png,image/jpeg" style="display:none" data-agent="${escAttr(agentId)}" data-tone="${escAttr(e.id)}">
      <span class="emote-upload" onclick="this.previousElementSibling.click()">+</span>
    </div>`;
  }).join('');
  strip.querySelectorAll('input[type="file"]').forEach(input => {
    input.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const aid = input.dataset.agent, tid = input.dataset.tone;
      const fd = new FormData();
      fd.append('agentId', aid); fd.append('toneId', tid); fd.append('file', file);
      try {
        const r = await fetch(hanaUrl('/api/plugins/crystal-speech-emote/api/upload-emote'), { method:'POST', body:fd });
        const res = await r.json();
        if (res.ok) { showToast('�?'+tid+' 上传成功'); await loadConfig(); renderEmoteStrip(currentAgent); updatePreview(); }
        else { showToast('�?'+(res.error||'失败')); }
      } catch(err) { showToast('�?'+err.message); }
    });
  });
}

document.getElementById('saveBtn').addEventListener('click', async () => {
  const p = document.getElementById('colorPrimary').value;
  const s = document.getElementById('colorSecondary').value;
  const sb = document.getElementById('colorSub').value;
  const f = document.querySelector('#fontGroup .btn.active')?.dataset.font || "'Dancing Script','Brush Script MT',cursive";
  const cnFont = document.querySelector('#cnFontGroup .btn.active')?.dataset.cnfont || 'system-ui,sans-serif';
  const enSize = document.getElementById('enSizeSelect').value;
  const cnSize = document.getElementById('cnSizeSelect').value;

  if (!agentsConfig[currentAgent]) agentsConfig[currentAgent] = { displayName:agentsConfig[currentAgent]?.displayName||currentAgent, theme:{}, emotes:{}, toneMap:{} };
  agentsConfig[currentAgent].theme = {
    primary: p, primaryGlow: hexToRgba(p,0.4), secondary: s, font: f,
    cnFont: cnFont, enSize: enSize, cnSize: cnSize, subColor: sb
  };
  agentsConfig[currentAgent].theme.deco = document.querySelector('#decoGroup .btn.active')?.dataset.deco || '�?;
  agentsConfig[currentAgent].toneMap = collectToneMap();
  if (!agentsConfig[currentAgent].emotes) agentsConfig[currentAgent].emotes = {};

  try {
    const r = await fetch(hanaUrl('/api/plugins/crystal-speech-emote/api/save-config'), { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(agentsConfig) });
    const res = await r.json();
    if (res.ok) {
      showToast('�?已保存（立即可用�?);
      await loadConfig();
      renderEmoteStrip(currentAgent);
      updatePreview();
    } else {
      showToast('�?'+(res.error||'失败'));
    }
  } catch(err) { showToast('�?'+err.message); }
});

function setupEventListeners() {
  ['toneInput','enInput','cnInput'].forEach(id => {
    document.getElementById(id).addEventListener('input', updatePreview);
  });
  ['enSizeSelect','cnSizeSelect'].forEach(id => {
    document.getElementById(id).addEventListener('change', updatePreview);
  });
}

function updatePreview() {
  const p = document.getElementById('colorPrimary').value;
  const s = document.getElementById('colorSecondary').value;
  const sb = document.getElementById('colorSub').value;
  const f = document.querySelector('#fontGroup .btn.active')?.dataset.font || "'Dancing Script','Brush Script MT',cursive";
  const deco = document.querySelector('#decoGroup .btn.active')?.dataset.deco || '�?;
  const en = document.getElementById('enInput').value.trim();
  const cn = document.getElementById('cnInput').value.trim();
  const tone = document.getElementById('toneInput').value;
  const bubble = document.getElementById('bubble');

  if (!en && !cn) {
    bubble.innerHTML = '<div class="ph">编辑下方内容，实时预览花体效�?/div>';
    document.getElementById('latexOut').textContent = '等待输入�?;
    document.getElementById('textOut').textContent = '等待输入�?;
    return;
  }
  const displayEn = en || '(英文)';
  const displayCn = cn || '(注释)';
  const g = hexToRgba(p, 0.4);

  bubble.innerHTML = `<p><span class="deco" style="color:${s}">${deco}</span><span class="crystal" style="color:${p};font-family:${f};text-shadow:0 0 4px ${g},0 0 10px ${g}">${escHtml(displayEn)}</span></p><div class="sub" style="color:${sb}">${escHtml(displayCn)}</div>`;

  const enSize = document.getElementById('enSizeSelect').value;
  const cnSize = document.getElementById('cnSizeSelect').value;
  document.getElementById('latexOut').textContent =
    `$${\\${enSize} \\textcolor{${s}}{\\text{${deco}}} \\underset{\\textcolor{${sb}}{\\text{\\${cnSize} ${escLatex(displayCn)}}}}{\\textcolor{${p}}{\\underline{\\mathscr{${escLatex(displayEn)}}}}}$$`;
  document.getElementById('textOut').textContent = `${deco} ${displayEn}\n�?${displayCn}`;
  renderEmoteStrip(currentAgent);
}

document.getElementById('copyLatex').addEventListener('click', () => doCopy('latexOut'));
document.getElementById('copyText').addEventListener('click', () => doCopy('textOut'));
function doCopy(id) {
  const text = document.getElementById(id).textContent;
  if (text === '等待输入�?) return;
  navigator.clipboard.writeText(text).then(() => showToast('�?已复�?));
}

function showToast(msg) {
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escStyle(s) { return String(s).replace(/["\'`<>]/g,''); }
function escLatex(s) { return s.replace(/\\/g,'\\textbackslash{}').replace(/_/g,'\\_').replace(/&/g,'\\&').replace(/%/g,'\\%').replace(/\$/g,'\\$').replace(/#/g,'\\#').replace(/{/g,'\\{').replace(/}/g,'\\}').replace(/~/g,'\\textasciitilde{}').replace(/\^/g,'\\textasciicircum{}'); }

init();
</script>
</body>
</html>
